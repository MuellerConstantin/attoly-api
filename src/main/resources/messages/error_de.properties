ValidationError.message=Die Validierung des Anfragepayloads ist semantisch fehlschlagen.
MissingQueryParameterError.message=Ein benötigter Query Parameter ist in der Anfrage nicht vorhanden.
MissingPathVariableError.message=Eine benötigte Pfadvariable ist in der Anfrage nicht vorhanden.
HttpRequestMethodNotSupportedError.message=Die Anfrage verwendet eine HTTP Methode, die nicht unterstützt wird.
HttpMediaTypeNotSupportedError.message=Der Anfrage Content-Type wird nicht unterstützt.
TypeMismatchError.message=Der Datentyp eines im Payload verwendeten Wertes ist nicht kompatibel mit dem erwarteten Datentyp.
InvalidPayloadFormatError.message=Der Anfragepayload konnte nicht gelesen werden.
InternalError.message=Es ist ein Fehler aufgetreten. Bitte versuchen Sie es später erneut.
NotFoundError.message=Die angeforderte Ressource konnte nicht gefunden werden.
InvalidVerificationTokenError.message=Das verwendete Verification Token ist ungültig.
InvalidResetTokenError.message=Das verwendete Reset Token ist ungültig.
InvalidCredentialsError.message=Benutzername und/oder Passwort sind falsch.
AuthenticationError.message=Authentifizierung fehlgeschlagen. Der Zugriff muss authentifiziert werden.
InsufficientPermissionsError.message=Der aktuelle Benutzer hat nicht die erforderlichen Berechtigungen.
MustBeAdministrableError.message=Es ist nicht möglich, den letzten Administrator des Systems zu löschen/verändern.
AccountDisabledError.message=Der Benutzeraccount ist deaktiviert, möglicherweise muss zuerst die E-Mail-Adresse verifiziert werden.
AccountLockedError.message=Der Benutzeraccount ist gesperrt, eine Anmeldung ist nicht möglich.
AlreadySubscribedError.message=Der Benutzer hat bereits ein aktives Abonnement.
NoCustomerYetError.message=Der Benutzer hat noch kein Kundenkonto.
FeatureNotAvailableError.message=Diese Funktion ist für dein Abonnement nicht verfügbar. Bitte upgrade dein Abonnement, um Zugriff zu erhalten.
PermanentShortcutLimitExceededError.message=Die maximale Anzahl an in deinem Abonnement erlaubten permanenten Shortcuts wurde erreicht. Bitte lösche einen Shortcut oder upgrade dein Abonnement, um mehr Shortcuts zu erhalten.
ExpirableShortcutLimitExceededError.message=Die maximale Anzahl an in deinem Abonnement erlaubten ablaufbaren Shortcuts wurde erreicht. Bitte lösche einen Shortcut oder upgrade dein Abonnement, um mehr Shortcuts zu erhalten.
UnsupportedFilterQueryFieldError.message=Das angegebene Filter Query Feld wird nicht unterstützt.
UnsupportedFilterQueryOperatorError.message=Der angegebene Filter Query Operator wird für das angegebene Feld nicht unterstützt.
InvalidShortcutPasswordError.message=Das angegebene Shortcut Passwort ist ungültig.
ShortcutPasswordRequiredError.message=Für diesen Shortcut ist ein Passwort erforderlich.
