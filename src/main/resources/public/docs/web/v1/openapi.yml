  contact:
    name: "Constantin Müller"
    url: https://github.com/MuellerConstantin
servers:
  - url: http://localhost:8080/api/v1
    description: Development Server
tags:
  - name: User
    description: Everything about user and account management.
  - name: Role
    description: Manage roles and user permissions.
  - name: Auth
    description: Allows the client to authenticate themselves.
  - name: Shortcut
    description: Allows shortcuts to be managed.
  - name: Complaint
    description: Manages complaints of shortcuts, i.e. all complaints about potentially unwanted shortcuts.
paths:
  /users:
    post:
      tags: [ User ]
      summary: Creates a new user.
      description: >
        Creates a new user. This endpoint can be used to register a new user account on the
        platform. The user must provide an email address and a password to create a new user
        account. After successful registration, the user account is created but not yet verified.
        To verify the account, the user must use the `POST /user/verify` endpoint with the
        verification token that is sent to the user's email address after registration.
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationDto"
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeDto"
          description: Successfully created a new user.
        '422':
          $ref: "#/components/responses/422"
  /user/me:
    get:
      tags: [ User ]
      summary: Retrieves the currently authenticated user.
      description: >
        Retrieves the currently authenticated user. This endpoint can be used to retrieve
        the details of your own user account, e.g. email, creation time and subscription plan.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeDto"
          description: The successfully retrieved user.
        '401':
          $ref: "#/components/responses/401"
    delete:
      tags: [ User ]
      summary: Deletes your own user account.
      description: >
        Deletes your own user account. This endpoint can be used to delete your user account.
        After deletion, the user account is no longer available and can not be used for
        authentication. All shortcuts that were created by the user are also deleted.
      responses:
        '204':
          description: Successfully deleted your user account.
        '401':
          $ref: "#/components/responses/401"
  /user/me/password:
    patch:
      tags: [ User ]
      summary: Updates your own user account's password.
      description: >
        Updates your own user account's password. This endpoint can be used to change the password
        of your user account. You must provide your current password and the new password. If the
        current password is correct, the password of your user account is updated to the new
        password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordDto"
      responses:
        '204':
          description: Successfully changed the user's password.
        '401':
          $ref: "#/components/responses/401"
        '422':
          $ref: "#/components/responses/422"
  /user/verify:
    get:
      tags: [ User ]
      security: [ ]
      summary: Resends the verification token for a user.
      description: >
        Resends the verification token for a user. This endpoint can be used to resend the
        verification token for a user in case they did not receive the email with the
        verification token after registration. The user must provide their email address.
        If the email address is associated with a user account that is not yet verified, a
        new verification token is generated and sent to the user's email address.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Successfully requested a new verification token for the user.
        '422':
          $ref: "#/components/responses/422"
    post:
      tags: [ User ]
      security: [ ]
      summary: Verifies a user account with a verification token.
      description: >
        Verifies a user account with a verification token. This endpoint is used to verify a user
        account after registration. The verification token is usually sent to the user's email
        address and must be provided in the request body to verify the account. If the provided
        token is valid, the user account is marked as verified and can be used for authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserVerificationDto"
      responses:
        '204':
          description: Successfully verified the user.
        '401':
          $ref: "#/components/responses/401"
  /user/reset:
    get:
      tags: [ User ]
      security: [ ]
      summary: Requests a password reset token for a user.
      description: >
        Requests a password reset token for a user. This endpoint can be used to request a password
        reset token for a user in case they forgot their password. The user must provide their email
        address. If the email address is associated with a user account, a
        password reset token is generated and sent to the user's email address. The token can then
        be used to reset the password of the user account via the `POST /user/reset` endpoint.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Successfully requested a password reset token for the user.
        '422':
          $ref: "#/components/responses/422"
    post:
      tags: [ User ]
      security: [ ]
      summary: Resets the password of a user.
      description: >
        Resets the password of a user. This endpoint can be used to reset the password of
        a user in case they forgot their password. The user must provide a valid reset token, which
        is usually sent to the user's email address, and the new password. If the reset token is
        valid, the user's password is updated to the new password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserResetDto"
      responses:
        '204':
          description: Successfully reset the user's password.
        '401':
          $ref: "#/components/responses/401"
  /auth/token:
    post:
      tags: [ Auth ]
      security: [ ]
      summary: Issues access and refresh tokens for the provided credentials.
      description: >
        Issues access and refresh tokens for the provided credentials. The access token is a JWT
        that can be used for authentication in subsequent requests. The refresh token is an opaque
        token that can be used to generate new access tokens without having to resend the credentials.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsDto"
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenDto"
          description: The issued tokens.
        '401':
          $ref: "#/components/responses/401"
  /auth/refresh:
    post:
      tags: [ Auth ]
      security: [ ]
      summary: Refreshes the access token using a refresh token.
      description: >
        Refreshes the access token using a refresh token. This endpoint can be used to stay logged
        in for a longer period of time without having to resend the credentials. The refresh token
        must be sent in the request body and is then used to generate a new access token, which
        is returned in the response. The refresh token itself is also renewed and returned in the
        response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshSessionDto"
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenDto"
          description: The refreshed tokens.
        '401':
          $ref: "#/components/responses/401"
  /user/me/roles:
    get:
      tags: [ Role ]
      summary: Retrieves the roles of the currently authenticated user.
      description: >
        Retrieves the roles of the currently authenticated user. The roles determine the permissions
        of the user and thus what operations they are allowed to perform on the platform.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolePageDto"
          description: The roles of the currently authenticated user.
        '401':
          $ref: "#/components/responses/401"
  /user/me/usage:
    get:
      tags: [ User ]
      summary: Retrieves the subscription usage information of the currently authenticated user.
      description: >
        Retrieves the subscription usage information of the currently authenticated user.
        This includes the current subscription plan, the usage limits and the current
        usage of the user.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageInfoDto"
          description: The subscription usage information of the currently authenticated user.
        '401':
          $ref: "#/components/responses/401"
  /shortcuts:
    post:
      tags: [ Shortcut ]
      security: [ ]
      summary: Creates a new shortcut.
      description: >
        Creates a new shortcut. If the request is made anonymously, the created shortcut will be
        anonymous as well. This means that the shortcut can not be managed after its creation,
        e.g. it can not be deleted or updated. Anonymous shortcuts are also automatically
        deleted after a certain period of time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShortcutCreationDto"
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortcutDto"
          description: Successfully created a new shortcut.
        '422':
          $ref: "#/components/responses/422"
  /shortcuts/{tag}:
    get:
      tags: [ Shortcut ]
      security: [ ]
      summary: Retrieves a shortcut by its tag.
      description: >
        Retrieves the details of a shortcut by its tag. Only active and not expired shortcuts
        are accessible via this public endpoint. This means a shortcut must be still valid
        to be retrieved via this endpoint.
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortcutDto"
          description: The successfully retrieved shortcut.
        '404':
          $ref: "#/components/responses/404"
        '403':
          $ref: "#/components/responses/403"
  /shortcuts/{tag}/resolve:
    post:
      tags: [ Shortcut ]
      security: [ ]
      summary: Resolves a password protected shortcut by its tag.
      description: >
        Resolves a password protected shortcut by its tag. If a shortcut is password protected,
        it can not be retrieved via the public endpoint `GET /shortcuts/{tag}`. Instead, this
        endpoint must be used to resolve the shortcut.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShortcutPasswordDto"
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortcutDto"
          description: The successfully retrieved shortcut.
        '404':
          $ref: "#/components/responses/404"
        '403':
          $ref: "#/components/responses/403"
  /user/me/shortcuts/{tag}:
    delete:
      tags: [ Shortcut ]
      summary: Deletes a shortcut of the currently authenticated user by its tag.
      description: >
        Deletes a shortcut of the currently authenticated user by its tag.
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Successfully deleted the shortcut.
        '401':
          $ref: "#/components/responses/401"
        '404':
          $ref: "#/components/responses/404"
    get:
      tags: [ Shortcut ]
      summary: Retrieves a shortcut of the currently authenticated user by its tag.
      description: >
        Retrieves the details of a shortcut of the currently authenticated user by its tag. Using
        this endpoint, you can also access already expired or disabled shortcuts, which are not
        accessible via the public endpoint `GET /shortcuts/{tag}`.
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortcutDetailsDto"
          description: The successfully retrieved shortcut.
        '404':
          $ref: "#/components/responses/404"
  /user/me/shortcuts:
    get:
      tags: [ Shortcut ]
      summary: Retrieves the shortcuts of the currently authenticated user.
      description: >
        Retrieves the shortcuts of the currently authenticated user. Using this endpoint,
        you can also access already expired or disabled shortcuts, which are not accessible
        via the public endpoint `GET /shortcuts/{tag}`.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortcutDetailsPageDto"
          description: The successfully retrieved page of shortcuts.
        '401':
          $ref: "#/components/responses/401"
  /shortcuts/{tag}/complaints:
    post:
      tags: [ Complaint ]
      security: [ ]
      summary: Complains about a shortcut by its tag.
      description: >
        Complains about a shortcut by its tag. This endpoint can be used to report potentially
        unwanted shortcuts, e.g. shortcuts that link to spam, malware, phishing or defacement
        content. Complaints are anonymous and can be made by any user, even without authentication.
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintCreationDto"
      responses:
        '204':
          description: Successfully complained the shortcut.
        '422':
          $ref: "#/components/responses/422"
components:
  schemas:
    ErrorDto:
      type: object
      properties:
        error:
          type: string
          description: The type of error.
        timestamp:
          type: string
          format: date-time
          description: The time the error occurred.
        message:
          type: string
          description: Human-readable description of the error.
        path:
          type: string
          description: The endpoint path on which the error occurred.
        status:
          type: integer
          description: The HTTP status code associated with the error.
        details:
          description: Further information on the error or its cause.
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - code
        - message
        - timestamp
        - path
    MeDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        identityProvider:
          type: string
          description: The identity provider of the user account.
          enum: [ LOCAL, GITHUB ]
        plan:
          type: string
          description: The subscription plan of the user.
          enum: [ FREE, PRO ]
        billing:
          type: object
          description: Billing information of the user.
          properties:
            customerId:
              type: string
              description: The identifier of the customer in the billing system.
            subscriptionId:
              type: string
              description: The identifier of the subscription in the billing system.
            status:
              type: string
              description: The status of the subscription in the billing system.
              enum: [ ACTIVE, CANCELED, PAST_DUE ]
            currentPeriodStart:
              type: string
              format: date-time
              description: The start of the current billing period.
            currentPeriodEnd:
              type: string
              format: date-time
              description: The end of the current billing period.
      required: [ id, email, createdAt, identityProvider, plan, billing ]
    RegistrationDto:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    ChangePasswordDto:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required: [ currentPassword, newPassword ]
    UserVerificationDto:
      type: object
      required: [ verificationToken ]
      properties:
        verificationToken:
          type: string
    UserResetDto:
      type: object
      required: [ resetToken, password ]
      properties:
        resetToken:
          type: string
        password:
          type: string
    RoleDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of shortcut.
        name:
          type: string
          description: Unique name of the role.
    RolePageDto:
      allOf:
        - $ref: "#/components/schemas/PageDto"
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: "#/components/schemas/RoleDto"
          required:
            - content
    CredentialsDto:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
        password:
          type: string
    RefreshSessionDto:
      type: object
      required: [ refreshToken ]
      properties:
        refreshToken:
          type: string
    TokenDto:
      type: object
      required:
        - type
        - principal
        - accessToken
        - refreshToken
        - accessExpiresIn
        - refreshExpiresIn
      properties:
        type:
          type: string
        principal:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        accessExpiresIn:
          type: integer
        refreshExpiresIn:
          type: integer
    ShortcutDto:
      type: object
      required: [ id, tag, url, createdAt, permanent, anonymous ]
      properties:
        id:
          type: string
          format: uuid
        tag:
          type: string
        url:
          type: string
          format: url
        createdAt:
          type: string
          format: date-time
        permanent:
          type: boolean
          description: Indicates if the shortcut was created permanently.
        anonymous:
          type: boolean
          description: Indicates if the shortcut was created anonymously.
    ShortcutPasswordDto:
      type: object
      required: [ password ]
      properties:
        password:
          type: string
    ShortcutDetailsDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of shortcut.
        tag:
          type: string
          description: Unique tag which is used as a short link.
        url:
          type: string
          format: url
          description: The actual URL to resolve.
        createdAt:
          type: string
          format: date-time
          description: Time at which the shortcut was created.
        updatedAt:
          type: string
          format: date-time
          description: Time at which the shortcut was updated.
        permanent:
          type: boolean
          description: Indicates if the shortcut was created permanently.
      required:
        - id
        - tag
        - url
        - createdAt
        - updatedAt
        - permanent
    ShortcutDetailsPageDto:
      allOf:
        - $ref: "#/components/schemas/PageDto"
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: "#/components/schemas/ShortcutDetailsDto"
    ShortcutCreationDto:
      type: object
      required: [ url ]
      properties:
        url:
          type: string
          format: url
        permanent:
          type: boolean
          description: Indicates if the shortcut should be created permanently.
        expiresAt:
          type: string
          format: date-time
          description: The time at which the shortcut should expire. Ignored if `permanent` is set to true.
    ComplaintCreationDto:
      type: object
      required: [ reason, comment ]
      properties:
        reason:
          type: string
          enum: [ SPAM, MALWARE, PHISHING, DEFACEMENT ]
        comment:
          type: string
    PageDto:
      type: object
      required: [ page, perPage, totalElements, totalPages ]
      properties:
        page:
          type: integer
        perPage:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
    UsageInfoDto:
      type: object
      properties:
        plan:
          type: string
          description: The subscription plan of the user.
          enum: [ FREE, PRO ]
        usageLimits:
          type: object
          properties:
            maxPermanentShortcuts:
              type: integer
              description: The maximum number of shortcuts allowed.
            maxExpirableShortcuts:
              type: integer
              description: The maximum number of expirable shortcuts allowed.
          required:
            - maxPermanentShortcuts
            - maxExpirableShortcuts
        currentUsage:
          type: object
          properties:
            currentPermanentShortcuts:
              type: integer
              description: The current number of permanent shortcuts.
            currentExpirableShortcuts:
              type: integer
              description: The current number of expirable shortcuts.
          required:
            - currentPermanentShortcuts
            - currentExpirableShortcuts
      required:
        - usageLimits
        - currentUsage
  responses:
    '500':
      description: An internal error has occurred on the server side.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    '400':
      description: The request was incorrectly configured.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    '401':
      description: Authentication failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    '422':
      description: The request payload validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    '404':
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    '429':
      description: Too many requests.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'
    '403':
      description: Forbidden.
      content:
        application/json:
          schema:
